      <stop offset="0.32" stop-color="#90d8ef"/>
      <stop offset="0.62" stop-color="#53636b"/>
      <stop offset="1" stop-color="#f2f7f7"/>
    </linearGradient>
    <linearGradient id="spray" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e9ffff" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#74ddff" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#e9ffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="headlight" cx="50%" cy="50%" r="50%">
