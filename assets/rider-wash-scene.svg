<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 950" role="img" aria-labelledby="title desc">
  <title id="title">Pressure washing rider mascot on a cruiser motorcycle</title>
  <desc id="desc">A stylized middle-aged blonde rider with blue eyes sitting on a black cruiser motorcycle while a pressure washer spray arcs across a driveway.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17211d"/>
      <stop offset="0.45" stop-color="#24433f"/>
      <stop offset="1" stop-color="#f4663a"/>
    </linearGradient>
    <linearGradient id="asphalt" x1="0" y1="0" x2="1" y2="0">
