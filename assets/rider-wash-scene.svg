      <stop offset="0.55" stop-color="#ffd45b" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#ffd45b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="foamDots" width="42" height="42" patternUnits="userSpaceOnUse">
      <circle cx="7" cy="9" r="2.5" fill="#f7fff7" opacity="0.42"/>
      <circle cx="27" cy="25" r="3" fill="#9be7ff" opacity="0.38"/>
      <circle cx="38" cy="6" r="1.8" fill="#f7fff7" opacity="0.32"/>
    </pattern>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
